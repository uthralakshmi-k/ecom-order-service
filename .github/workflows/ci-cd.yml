name: CI/CD Pipeline

# Trigger on push to dev/test/main or manual dispatch
on:
  push:
    branches:
      - dev
      - test
      - main
  workflow_dispatch:
    inputs:
      profile:
        description: 'Spring profile to use (test, dev, prod)'
        required: true
        default: 'test'

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # Default profile is CI unless overridden
      SPRING_PROFILE: ${{ github.event.inputs.profile || 'test' }}

    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Java 21
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # Step 3: Cache Maven dependencies
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # Step 4: Build and run tests with the specified Spring profile
      - name: Build and run tests
        run: mvn clean package -B -Dspring.profiles.active=$SPRING_PROFILE

      # Step 5: Archive JAR for CD deployment
      - name: Archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ecom-order-service
          path: target/*.jar

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
             push: true
             tags: ${{ secrets.DOCKER_USERNAME }}/ecom-order-dockerimage:latest